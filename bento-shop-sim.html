<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>弁当屋経営シミュレーション</title>
  <style>
    body { font-family: sans-serif; background-color: #f4f6f7; color: #333; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h1 { text-align: center; color: #d35400; }
    h2 { border-left: 5px solid #e67e22; padding-left: 10px; color: #2c3e50; font-size: 1.2rem; }
    .status-bar { display: flex; justify-content: space-between; background: #e67e22; color: white; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; }
    .event-banner { background: #f1c40f; color: #2c3e50; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; border-left: 8px solid #f39c12; }
    .event-title { font-size: 1.2rem; margin-bottom: 5px; color: #c0392b; }
    .game-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-top: 20px; }
    .menu-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; background: #fffdf9; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .menu-info h3 { margin: 0 0 5px 0; color: #c0392b; }
    .sell-btn { background-color: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .develop-box { background: #fdfefe; border: 2px dashed #3498db; border-radius: 8px; padding: 15px; }
    .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
    .checkbox-label { display: flex; align-items: center; gap: 6px; background: #edf2f7; padding: 6px; border-radius: 5px; font-size: 0.85rem; }
    .input-name { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .dev-btn { background-color: #3498db; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
    .log-window { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; height: 140px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; margin-top: 20px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="container">
  <h1>🍱 弁当屋経営シミュレーション</h1>
  
  <div class="status-bar">
    <div id="display-day">1日目</div>
    <div id="display-funds">資金: 5,000円</div>
    <div id="display-goal">目標: 30,000円</div>
  </div>

  <div class="event-banner" id="event-board">
    <div class="event-title">☀️ 平常運転</div>
    <div class="event-effect">今日も絶好の弁当日和です。特記事項はありません。</div>
  </div>

  <div class="game-grid">
    <div>
      <h2>販売中のメニュー（4個販売で翌日へ）</h2>
      <div class="menu-container" id="menu-list"></div>
    </div>

    <div>
      <h2>🛠️ 新メニュー開発</h2>
      <div class="develop-box">
        <label><strong>お弁当の名前:</strong></label>
        <input type="text" id="bento-name" class="input-name" placeholder="例：特製鮭唐揚げ弁当" />
        
        <label style="display:block; margin-top:12px;"><strong>具材を選ぶ:</strong></label>
        <div class="checkbox-group" id="ingredient-choices"></div>
        <button class="dev-btn" id="btn-develop">新メニューを登録</button>
      </div>
    </div>
  </div>

  <h2>営業ログ</h2>
  <div class="log-window" id="log-box">
    📢 開店しました！30,000円達成でゲームクリアです。<br>
  </div>
</div>

<script>
  // ブラウザで100%動くように、素のJavaScriptに自動翻訳したコードです
  const INGREDIENT_LIST = [
    { id: "rice", name: "ごはん", cost: 50 },
    { id: "karaage", name: "ジューシー唐揚げ", cost: 120 },
    { id: "salmon", name: "極上焼き鮭", cost: 160 },
    { id: "tamagoyaki", name: "甘い卵焼き", cost: 40 },
    { id: "broccoli", name: "のり・ベジ", cost: 20 },
  ];

  const GAME_EVENTS = [
    { title: "☀️ 平常運転", description: "平和な一日です。すべての食材が通常価格です。", costModifiers: {}, priceModifier: 1.0, discardChance: 0.0 },
    { title: "🥵 記録的な猛暑！", description: "お弁当が腐りやすい状態です！販売時に15%の確率で廃棄損が発生します。", costModifiers: {}, priceModifier: 1.0, discardChance: 0.15 },
    { title: "🌊 鮭の歴史的不漁", description: "鮭の流通量が激減！本日限定で「極上焼き鮭」の仕入れコストが【2.5倍】になります！", costModifiers: { salmon: 2.5 }, priceModifier: 1.0, discardChance: 0.0 },
    { title: "🚀 空前のから揚げブーム！", description: "から揚げを含むお弁当が、本日に限り【1.3倍】の高値で売れます！", costModifiers: {}, priceModifier: 1.3, discardChance: 0.0 },
    { title: "🌾 米不足の波", description: "お米の価格が一時的に高騰！「ごはん」の仕入れコストが【2.0倍】になります。", costModifiers: { rice: 2.0 }, priceModifier: 1.0, discardChance: 0.0 }
  ];

  class BentoTycoonWithEvents {
    constructor() {
      this.funds = 5000;
      this.day = 1;
      this.targetFunds = 30000;
      this.salesCount = 0;
      this.currentEvent = GAME_EVENTS[0];
      this.menus = [
        { name: "定番鮭弁当", ingredients: [INGREDIENT_LIST[0], INGREDIENT_LIST[2], INGREDIENT_LIST[3]], price: 450 },
        { name: "から揚げのり弁", ingredients: [INGREDIENT_LIST[0], INGREDIENT_LIST[1], INGREDIENT_LIST[4]], price: 350 }
      ];

      this.renderIngredientChoices();
      this.renderMenu();
      this.updateStatus();
      document.getElementById("btn-develop").addEventListener("click", () => this.developNewMenu());
    }

    renderIngredientChoices() {
      const container = document.getElementById("ingredient-choices");
      container.innerHTML = INGREDIENT_LIST.map(ing => `
        <label class="checkbox-label">
          <input type="checkbox" name="ingredients" value="${ing.id}">
          ${ing.name} (${ing.cost}円)
        </label>
      `).join("");
    }

    calculateCurrentCost(bento) {
      return bento.ingredients.reduce((sum, ing) => {
        const modifier = this.currentEvent.costModifiers[ing.id] || 1.0;
        return sum + Math.floor(ing.cost * modifier);
      }, 0);
    }

    calculateCurrentPrice(bento) {
      let price = bento.price;
      if (this.currentEvent.title.includes("から揚げブーム") && bento.ingredients.some(i => i.id === "karaage")) {
        price = Math.floor(price * this.currentEvent.priceModifier);
      }
      return price;
    }

    renderMenu() {
      const menuList = document.getElementById("menu-list");
      menuList.innerHTML = "";

      this.menus.forEach((bento, index) => {
        const currentCost = this.calculateCurrentCost(bento);
        const currentPrice = this.calculateCurrentPrice(bento);
        const ingredientNames = bento.ingredients.map(i => i.name).join("＋");

        const card = document.createElement("div");
        card.className = "menu-card";
        card.innerHTML = `
          <div class="menu-info">
            <h3>${bento.name}</h3>
            <div style="font-size:0.8rem; color:#666;">${ingredientNames}</div>
            <div>価格: <strong style="color: #e67e22;">${currentPrice}円</strong> <span style="color:#7f8c8d; font-size:0.85rem;">(原価: ${currentCost}円)</span></div>
          </div>
          <button class="sell-btn" id="sell-${index}">1個売る</button>
        `;
        menuList.appendChild(card);
        document.getElementById(`sell-${index}`).addEventListener("click", () => this.sellBento(bento));
      });
    }

    sellBento(bento) {
      const currentCost = this.calculateCurrentCost(bento);
      const currentPrice = this.calculateCurrentPrice(bento);

      if (this.funds < currentCost) {
        this.addLog(`❌ 資金不足！材料費（${currentCost}円）が足りません。`);
        return;
      }

      this.funds -= currentCost;

      if (Math.random() < this.currentEvent.discardChance) {
        this.addLog(`⚠️ <strong>【廃棄発生】</strong> 猛暑で ${bento.name} が傷んでしまいました… (損害: -${currentCost}円)`);
      } else {
        this.funds += currentPrice;
        this.addLog(`🍱 【${bento.name}】を販売！ (純利益: +${currentPrice - currentCost}円)`);
      }

      this.salesCount++;

      if (this.salesCount >= 4) {
        this.nextDay();
      } else {
        this.updateStatus();
        this.renderMenu();
      }
    }

    nextDay() {
      this.day++;
      this.salesCount = 0;
      this.currentEvent = GAME_EVENTS[Math.floor(Math.random() * GAME_EVENTS.length)];

      const board = document.getElementById("event-board");
      board.innerHTML = `
        <div class="event-title">📢 【${this.day}日目の状況】 ${this.currentEvent.title}</div>
        <div class="event-effect">${this.currentEvent.description}</div>
      `;
      board.style.background = this.currentEvent.title.includes("平常") ? "#f1c40f" : "#ff7675";
      board.style.color = this.currentEvent.title.includes("平常") ? "#2c3e50" : "#ffffff";

      this.addLog(`☀️ <strong>【${this.day}日目】</strong> が始まりました！`);
      this.updateStatus();
      this.renderMenu();
    }

    developNewMenu() {
      const nameInput = document.getElementById("bento-name");
      const bentoName = nameInput.value.trim();
      if (!bentoName) return alert("名前を入力してください");

      const checkedBoxes = document.querySelectorAll('input[name="ingredients"]:checked');
      const selected = [];
      checkedBoxes.forEach(box => {
        const ing = INGREDIENT_LIST.find(i => i.id === box.value);
        if (ing) selected.push(ing);
      });

      if (selected.length === 0) return alert("具材を選んでください");

      const baseCost = selected.reduce((sum, ing) => sum + ing.cost, 0);
      const standardPrice = Math.ceil((baseCost * 1.6) / 50) * 50;

      this.menus.push({ name: bentoName, ingredients: selected, price: standardPrice });
      this.addLog(`🛠️ 新メニュー【${bentoName}】を開発しました！`);

      nameInput.value = "";
      document.querySelectorAll('input[name="ingredients"]').forEach(box => box.checked = false);
      this.renderMenu();
    }

    updateStatus() {
      document.getElementById("display-day").innerText = `${this.day}日目`;
      document.getElementById("display-funds").innerText = `資金: ${this.funds.toLocaleString()}円`;
      
      if (this.funds >= this.targetFunds) {
        this.addLog(`🎉 <strong>【ゲームクリア！】</strong> 目標達成！`);
        document.querySelectorAll("button, input").forEach(el => el.disabled = true);
      } else if (this.funds <= 0) {
        this.addLog(`💀 <strong>【ゲームオーバー】</strong> 倒産しました…`);
        document.querySelectorAll("button, input").forEach(el => el.disabled = true);
      }
    }

    addLog(message) {
      const logBox = document.getElementById("log-box");
      logBox.innerHTML += `${message}<br>`;
      logBox.scrollTop = logBox.scrollHeight;
    }
  }

  window.addEventListener("DOMContentLoaded", () => { new BentoTycoonWithEvents(); });
</script>
</body>
</html>
